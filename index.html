<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vibrant Davis</title>
    <meta
      name="description"
      content="Vibrant Davis — a project of Somerville YIMBY for a lively, welcoming Davis Square."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fdfbf7;
        --fg: #1f2933;
        --accent: #0e7c66;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #16211f;
          --fg: #f0ede6;
          --accent: #4cc3a5;
        }
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        text-align: center;
        padding: 2rem;
        box-sizing: border-box;
      }
      main {
        max-width: 32rem;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 3rem);
        margin: 0 0 0.5rem;
        color: var(--accent);
      }
      p {
        font-size: 1.125rem;
        line-height: 1.6;
        margin: 0.5rem 0;
      }
      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vibrant Davis</h1>
      <p>Working toward a lively, welcoming Davis Square.</p>
      <p>Something is coming soon. In the meantime, find us at
        <a href="https://somervilleyimby.org">Somerville YIMBY</a>.</p>
    </main>
  </body>
</html>
